<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
</head>
<body>
    <h2>로그인</h2>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        <p>
            <label>아이디</label>
            <input type="text" name="username">
        </p>
        <p>
            <label>비밀번호</label>
            <input type="password" name="password">
        </p>
        <button type="submit">로그인</button>
    </form>
</body>
</html>
