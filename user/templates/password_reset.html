<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 재설정</title>
</head>
<body>
    <h2>비밀번호 재설정</h2>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <p>
            <label>아이디</label>
            <input type="text" name="username">
        </p>
        <p>
            <label>새 비밀번호</label>
            <input type="password" name="new_password">
        </p>
        <p>
            <label>비밀번호 확인</label>
            <input type="password" name="confirm_password">
        </p>
        <button type="submit">변경</button>
    </form>
</body>
</html>
