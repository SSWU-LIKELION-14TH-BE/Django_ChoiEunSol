
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
</head>
<body>
    <h1>{{ post.title }}</h1>
    <p>작성자: {{ post.author.nickname }}</p>
    <p>{{ post.content }}</p>

    <p>기술 스택: {{ post.get_tech_stack_display }}</p>

    {% if post.github_url %}
        <a href="{{ post.github_url }}">GitHub</a>
    {% endif %}
    <br>

    {% for image in post.images.all %}
        <img src="{{ image.image.url }}" width="300">
        <br>
    {% endfor %}

    {% if request.user == post.author %}
        <form action="{% url 'post_delete' post.pk %}" method="POST">
            {% csrf_token %}
            <button type="submit">삭제</button>
        </form>
    {% endif %}
</body>
</html>
